<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AI Resume Screener</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

    .card{background:#fff;border-radius:20px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2)}

    .logo{text-align:center;margin-bottom:32px}
    .logo-icon{font-size:3rem;margin-bottom:12px}
    .logo h1{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .logo p{color:#718096;font-size:.88rem;margin-top:6px}

    .form-group{margin-bottom:20px}
    label{display:block;font-weight:600;font-size:.85rem;color:#2d3748;margin-bottom:8px}

    .input-wrap{position:relative}
    .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;color:#a0aec0}
    input{width:100%;padding:12px 14px 12px 40px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.95rem;color:#2d3748;font-family:inherit;transition:border .2s,box-shadow .2s;background:#f7fafc}
    input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.15);background:#fff}

    .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#a0aec0;font-size:.85rem;user-select:none}
    .toggle-pw:hover{color:#667eea}

    .error-box{background:#fff5f5;border:1.5px solid #fc8181;border-radius:8px;padding:10px 14px;color:#c53030;font-size:.85rem;margin-bottom:18px;display:none}

    .btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;margin-top:4px}
    .btn:hover:not(:disabled){opacity:.92;transform:translateY(-1px)}
    .btn:disabled{opacity:.65;cursor:not-allowed}

    .hint{text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid #e2e8f0;color:#a0aec0;font-size:.8rem}
    .hint span{color:#667eea;font-weight:600}

    .loading{display:none;align-items:center;justify-content:center;gap:8px;color:#667eea;font-size:.9rem;font-weight:600;margin-top:16px}
    .spin{width:18px;height:18px;border:3px solid #e2e8f0;border-top-color:#667eea;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <h1>ResumeAI</h1>
    <p>Sign in to access the screening tool</p>
  </div>

  <div class="error-box" id="errorBox"></div>

  <form onsubmit="doLogin(event)">
    <div class="form-group">
      <label for="username">Username</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required/>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required/>
        <span class="toggle-pw" onclick="togglePw()">Show</span>
      </div>
    </div>

    <button class="btn" type="submit" id="loginBtn">Sign In</button>
  </form>

  <div class="loading" id="loading">
    <div class="spin"></div> Signing in...
  </div>

  <div class="hint">
    Default credentials: <span>admin</span> / <span>admin123</span>
  </div>
</div>

<script>
  // If already logged in, skip login
  if (localStorage.getItem('auth_token')) {
    window.location.href = '/';
  }

  function togglePw() {
    const inp = document.getElementById('password');
    const tog = document.querySelector('.toggle-pw');
    if (inp.type === 'password') { inp.type = 'text'; tog.textContent = 'Hide'; }
    else { inp.type = 'password'; tog.textContent = 'Show'; }
  }

  async function doLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errBox = document.getElementById('errorBox');
    const btn = document.getElementById('loginBtn');
    const loading = document.getElementById('loading');

    errBox.style.display = 'none';
    btn.disabled = true;
    btn.style.display = 'none';
    loading.style.display = 'flex';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        errBox.textContent = '⚠️ ' + (data.detail || 'Invalid credentials.');
        errBox.style.display = 'block';
      } else {
        localStorage.setItem('auth_token', data.token);
        window.location.href = '/';
      }
    } catch {
      errBox.textContent = '⚠️ Could not reach server. Make sure the API is running.';
      errBox.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.style.display = 'block';
      loading.style.display = 'none';
    }
  }
</script>
</body>
</html>
